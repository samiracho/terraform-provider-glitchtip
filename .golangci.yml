version: "2"

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - unconvert
    - gosec
  exclusions:
    rules:
      # Test fixtures use fake DSNs with embedded credentials.
      - path: _test\.go
        linters:
          - gosec
        text: G101

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofmt
